<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>主页</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ===== 加载动画 ===== */
    .dot-spinner {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      --uib-speed: 0.9s;
      height: 2.8rem;
      width: 2.8rem;
    }

    .dot-spinner__dot::before {
      content: '';
      height: 20%;
      width: 20%;
      border-radius: 50%;
      background-color: #fff;
      filter: drop-shadow(0 0 10px rgb(95, 150, 202));
      box-shadow: -6px -6px 11px #c1c1c1,
                  6px 6px 11px #ffffff;
      transform: scale(0);
      opacity: 0.5;
      animation: pulse0112 calc(var(--uib-speed) * 1.111) ease-in-out infinite;
      box-shadow: 0 0 20px rgba(18, 31, 53, 0.3);
    }

    .dot-spinner__dot {
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      height: 100%;
      width: 100%;
    }

    .dot-spinner__dot:nth-child(2) {
      transform: rotate(45deg);
    }
    .dot-spinner__dot:nth-child(2)::before {
      animation-delay: calc(var(--uib-speed) * -0.875);
    }

    .dot-spinner__dot:nth-child(3) {
      transform: rotate(90deg);
    }
    .dot-spinner__dot:nth-child(3)::before {
      animation-delay: calc(var(--uib-speed) * -0.75);
    }

    .dot-spinner__dot:nth-child(4) {
      transform: rotate(135deg);
    }
    .dot-spinner__dot:nth-child(4)::before {
      animation-delay: calc(var(--uib-speed) * -0.625);
    }

    .dot-spinner__dot:nth-child(5) {
      transform: rotate(180deg);
    }
    .dot-spinner__dot:nth-child(5)::before {
      animation-delay: calc(var(--uib-speed) * -0.5);
    }

    .dot-spinner__dot:nth-child(6) {
      transform: rotate(225deg);
    }
    .dot-spinner__dot:nth-child(6)::before {
      animation-delay: calc(var(--uib-speed) * -0.375);
    }

    .dot-spinner__dot:nth-child(7) {
      transform: rotate(270deg);
    }
    .dot-spinner__dot:nth-child(7)::before {
      animation-delay: calc(var(--uib-speed) * -0.25);
    }

    .dot-spinner__dot:nth-child(8) {
      transform: rotate(315deg);
    }
    .dot-spinner__dot:nth-child(8)::before {
      animation-delay: calc(var(--uib-speed) * -0.125);
    }

    @keyframes pulse0112 {
      0%, 100% {
        transform: scale(0);
        opacity: 0.5;
      }
      50% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* ===== 加载遮罩过渡 ===== */
    #loader {
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
  </style>
</head>
<body class="bg-gray-900 min-h-screen">

  <!-- 加载画面 -->
  <div id="loader" class="fixed inset-0 bg-gray-900 flex items-center justify-center z-50">
    <div class="dot-spinner">
      <div class="dot-spinner__dot"></div>
      <div class="dot-spinner__dot"></div>
      <div class="dot-spinner__dot"></div>
      <div class="dot-spinner__dot"></div>
      <div class="dot-spinner__dot"></div>
      <div class="dot-spinner__dot"></div>
      <div class="dot-spinner__dot"></div>
      <div class="dot-spinner__dot"></div>
    </div>
  </div>

  <!-- 主页面：左上角红黄绿三色圆点 -->
  <div class="absolute top-4 left-4 flex gap-2">
    <span class="inline-block w-3 h-3 rounded-full bg-red-500"></span>
    <span class="inline-block w-3 h-3 rounded-full bg-yellow-400"></span>
    <span class="inline-block w-3 h-3 rounded-full bg-green-500"></span>
  </div>

  <script>
    // 模拟加载过程，2.5 秒后隐藏加载画面
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        document.getElementById('loader').classList.add('hidden');
      }, 2500);
    });
  </script>

</body>
</html>
